syntax = "proto3";

package task;

option go_package = "github.com/JonMukaj/go-producer-consumer/internal/proto/gen";

message Task {
  int64 id    = 1;
  int32 type  = 2;
  int32 value = 3;
}

message TaskResponse {
  bool accepted = 1;
}

service TaskService {
  rpc SubmitTask(Task) returns (TaskResponse);
}
